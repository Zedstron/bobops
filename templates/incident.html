<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incidents | BobOps</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/assets/css/incident.css" />
</head>

<body>
    <div class="bg-animation"></div>
    <div class="particles"></div>

    <header>
        <a href="/" class="logo"><i class="fas fa-robot"></i> BobOps</a>
        <nav class="nav-actions">
            <a href="/">Home</a>
            <a href="/repo">Repositories</a>
            <a href="/incidents" class="active">Incidents</a>
            <a href="/settings">Settings</a>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <div>
                <h1><i class="fas fa-bell"></i> Production Incidents</h1>
                <p>Real-time error tracking & autonomous AI resolution pipeline</p>
            </div>
            <div class="filter-tabs">
                <div class="filter-tab active" data-filter="all">All</div>
                <div class="filter-tab" data-filter="ERROR">Error</div>
                <div class="filter-tab" data-filter="WARNING">Warning</div>
                <div class="filter-tab" data-filter="CRITICAL">Critical</div>
            </div>
        </div>

        <div id="incidentGrid" class="incident-grid"></div>
    </main>

    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Incident Details</h3>
                <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="card-snippet" id="modalException" style="margin-bottom: 1rem;"></div>
            <h4 style="margin-bottom: 0.5rem; color: var(--gray);">Traceback / Raw Log</h4>
            <div class="traceback-box" id="modalTraceback"></div>
            <div style="margin-top: 1.5rem; text-align: right;">
                <button class="btn-card btn-fix" id="modalFixBtn">
                    <i class="fas fa-wrench"></i> Initiate Auto-Fix
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Operation successful</span>
    </div>

    <script src="/assets/js/incident.js"></script>
</body>

</html>
